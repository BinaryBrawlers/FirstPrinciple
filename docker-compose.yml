version: "3.9"

services:
  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Required — copy .env.example to .env and set this before docker-compose up
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      # cognee env vars
      - LLM_PROVIDER=litellm
      - LLM_MODEL=mistral/mistral-large-latest
      - LLM_API_KEY=${MISTRAL_API_KEY}
      - EMBEDDING_PROVIDER=fastembed
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - COGNEE_SKIP_CONNECTION_TEST=true
    volumes:
      # Persist cognee graph data across container restarts
      - cognee_data:/app/.cognee_system
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cognee_data:
