services:
  # ── FastAPI backend ──────────────────────────────────────────────────────
  - type: web
    name: first-principle-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free               # upgrade to starter/standard for persistent disks
    healthCheckPath: /health
    envVars:
      - key: MISTRAL_API_KEY
        sync: false          # set this in the Render dashboard — never commit the value
      - key: LLM_PROVIDER
        value: litellm
      - key: LLM_MODEL
        value: mistral/mistral-large-latest
      - key: LLM_API_KEY
        fromEnvVar: MISTRAL_API_KEY
      - key: EMBEDDING_PROVIDER
        value: fastembed
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: COGNEE_SKIP_CONNECTION_TEST
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: cognee-data
      mountPath: /app/.cognee_system
      sizeGB: 1              # free tier: no persistent disk — remove this block on free plan
